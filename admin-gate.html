<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.1/dist/pocketbase.min.js"></script>
    <style>
        :root {
            --bg-body: #121212;
            --bg-panel: #1e1e1e;
            --bg-input: #2c2c2c;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333333;
            --primary: #008080;
            --success: #00c851;
            --danger: #ff4444;
            --shadow: 0 10px 40px rgba(0,0,0,0.5);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: radial-gradient(circle at center, #1e1e1e 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .admin-gate-container {
            background: var(--bg-panel);
            padding: 50px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 128, 128, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            border: 2px solid var(--primary);
        }

        .admin-icon i {
            font-size: 2.5rem;
            color: var(--primary);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 200, 81, 0.2);
            color: var(--success);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 25px;
            border: 1px solid var(--success);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 128, 128, 0.2);
        }

        .btn-admin {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-admin:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 128, 128, 0.4);
        }

        .btn-admin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 25px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: #555;
            line-height: 1.8;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .admin-gate-container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .admin-icon {
                width: 60px;
                height: 60px;
            }
            .admin-icon i {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-gate-container">
        <div class="admin-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h1>TBOS v3.0</h1>
        <p class="subtitle">Admin Access Portal</p>
        
        <div class="security-badge">
            <i class="fas fa-lock"></i>
            <span>Secure Admin Access</span>
        </div>

        <div class="error-message" id="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="error-text">Access Denied</span>
        </div>

        <form id="admin-form">
            <div class="input-group">
                <label>Admin Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="admin-pass" 
                        placeholder="Enter secure password" 
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <button type="submit" class="btn-admin" id="btn-submit">
                <i class="fas fa-unlock-alt"></i>
                <span>Access Dashboard</span>
                <div class="loading-spinner" id="loading-spinner"></div>
            </button>
        </form>

        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Main App
        </a>

        <div class="footer">
            <strong>Secure Admin Gateway</strong><br>
            TBOS v3.0 | Tomstudio BizHub Operations System<br>
            Built by <a href="#">Tomstudio Tech Academy</a><br>
            <a href="tel:+2348030827417"><i class="fas fa-phone"></i> +234 803 082 7417</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration (Update with your credentials)
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_KEY = 'your-anon-key';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Admin Credentials (For demo - replace with Supabase Auth in production)
        const ADMIN_PASSWORD = '@admin123#';

        // Form Handling
        document.getElementById('admin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('admin-pass').value;
            const btnSubmit = document.getElementById('btn-submit');
            const spinner = document.getElementById('loading-spinner');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // Show loading state
            btnSubmit.disabled = true;
            spinner.style.display = 'block';
            errorMessage.style.display = 'none';

            try {
                // ============================================
                // SUPABASE AUTH (Production)
                // ============================================
                /*
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: 'admin@tbos.com',
                    password: password
                });

                if (error) throw error;

                // Check if user has admin role
                const { data: userProfile } = await supabase
                    .from('users')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (userProfile.role !== 'Administrator') {
                    throw new Error('Insufficient privileges');
                }

                // Store admin session
                localStorage.setItem('tbos_admin', 'true');
                localStorage.setItem('tbos_role', 'Administrator');
                */

                // ============================================
                // DEMO MODE (For Testing)
                // ============================================
                await new Promise(resolve => setTimeout(resolve, 1000)); // Simulate API call

                if (password !== ADMIN_PASSWORD) {
                    throw new Error('Invalid admin password');
                }

                // Store admin session
                localStorage.setItem('tbos_admin', 'true');
                localStorage.setItem('tbos_role', 'Administrator');
                localStorage.setItem('tbos_user', JSON.stringify({
                    name: 'Admin User',
                    email: 'admin@tbos.com',
                    role: 'Administrator',
                    hub: 'IT'
                }));

                // Redirect to admin panel
                window.location.href = 'admin.html';

            } catch (error) {
                // Show error message
                errorMessage.style.display = 'block';
                errorText.textContent = error.message || 'Access Denied';
                
                // Reset button state
                btnSubmit.disabled = false;
                spinner.style.display = 'none';

                // Clear password field
                document.getElementById('admin-pass').value = '';
                document.getElementById('admin-pass').focus();
            }
        });

        // Allow Enter key to submit
        document.getElementById('admin-pass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('admin-form').dispatchEvent(new Event('submit'));
            }
        });

        // Security: Prevent right-click on password field
        document.getElementById('admin-pass').addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Security: Clear admin session on page unload
        window.addEventListener('beforeunload', function() {
            // Keep session for 30 minutes, then auto-logout
            const adminTime = localStorage.getItem('tbos_admin_time');
            if (adminTime && (Date.now() - parseInt(adminTime)) > 1800000) {
                localStorage.removeItem('tbos_admin');
                localStorage.removeItem('tbos_admin_time');
            }
        });

        // Set admin session time
        if (localStorage.getItem('tbos_admin')) {
            localStorage.setItem('tbos_admin_time', Date.now().toString());
        }

        // Check if already logged in as admin
        window.addEventListener('DOMContentLoaded', function() {
            const isAdmin = localStorage.getItem('tbos_admin');
            const adminTime = localStorage.getItem('tbos_admin_time');
            
            if (isAdmin && adminTime) {
                const timeElapsed = Date.now() - parseInt(adminTime);
                if (timeElapsed < 1800000) { // 30 minutes
                    window.location.href = 'admin.html';
                } else {
                    localStorage.removeItem('tbos_admin');
                    localStorage.removeItem('tbos_admin_time');
                }
            }
        });
    </script>
</body>
</html>
