<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#008080">
    <title>Admin Access | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Load Supabase FIRST -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Then load config (which initializes Supabase and exposes API) -->
<script src="config.js"></script>

    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-input: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --primary: #008080;
            --primary-hover: #006666;
            --success: #00c851;
            --danger: #ff4444;
            --radius: 16px;
        }
        [data-theme="cool"] {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --bg-input: #f5f7fa;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden;
            width: 100%;
        }
        [data-theme="cool"] body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .admin-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            z-index: 10;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.2); }
        .admin-header {
            background: linear-gradient(135deg, var(--primary) 0%, #004d4d 100%);
            padding: 40px 30px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .logo i { font-size: 2.5rem; color: #ffffff; }
        .admin-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #ffffff; }
        .admin-header .tagline { color: rgba(255,255,255,0.8); font-size: 0.85rem; letter-spacing: 1px; }
        .admin-body { padding: 40px 30px; }
        .error-message, .success-message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .error-message { background: rgba(255, 68, 68, 0.15); border: 1px solid var(--danger); color: var(--danger); }
        .success-message { background: rgba(0, 200, 81, 0.15); border: 1px solid var(--success); color: var(--success); }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 10px; font-size: 0.9rem; font-weight: 500; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
        }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0, 128, 128, 0.2); }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
            padding: 5px;
        }
        .password-toggle:hover { color: var(--primary); }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .admin-footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .admin-footer a { color: var(--primary); text-decoration: none; }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .security-notice {
            background: rgba(255, 187, 51, 0.2);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        @media (max-width: 480px) {
            .admin-header { padding: 30px 20px; }
            .admin-body { padding: 30px 20px; }
            .admin-header h1 { font-size: 1.5rem; }
            .logo { width: 60px; height: 60px; }
            .logo i { font-size: 1.8rem; }
            body { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="theme-icon"></i>
            <span id="theme-text">Dark</span>
        </button>
        <div class="admin-header">
            <div class="logo"><i class="fas fa-user-shield"></i></div>
            <h1>Admin Access</h1>
            <p class="tagline">Secure Admin Portal</p>
        </div>
        <div class="admin-body">
            <div class="security-notice">
                <i class="fas fa-lock"></i>
                <div>
                    <strong>Restricted Access</strong><br>
                    This portal is for authorized administrators only
                </div>
            </div>
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Access denied</span>
            </div>
            <div class="success-message" id="success-message">
                <i class="fas fa-check-circle"></i>
                <span id="success-text">Access granted!</span>
            </div>
            <form id="admin-form">
                <div class="form-group">
                    <label>Admin Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="email" id="admin-email" required placeholder="admin@tbos.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="admin-password" required placeholder="••••••••">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="password-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="btn-submit">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Access Dashboard</span>
                </button>
            </form>
            <a href="index.html" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Main App
            </a>
            <div class="admin-footer">
                <strong>Secure Admin Gateway</strong><br>
                TBOS v3.0 | Tomstudio BizHub Operations System<br>
                Built by <a href="#">Tomstudio Tech Academy</a><br>
                Contact: <a href="tel:+2348185504382">+234 818 550 4382</a>
            </div>
        </div>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const SUPABASE_URL = 'https://wbmshbmfrteutglydiay.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibXNoYm1mcnRldXRnbHlkaWF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjk5OTIsImV4cCI6MjA5MjkwNTk5Mn0.UiV0Uaxv0fXb_sHuoIOJ2AGJKenUmfmFAzaifPY0A6Y';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'dark' : 'cool';
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (newTheme === 'cool') {
                document.documentElement.setAttribute('data-theme', 'cool');
                icon.className = 'fas fa-sun';
                text.textContent = 'Cool';
                localStorage.setItem('tbos_theme', 'cool');
            } else {
                document.documentElement.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                text.textContent = 'Dark';
                localStorage.setItem('tbos_theme', 'dark');
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('admin-password');
            const passwordEye = document.getElementById('password-eye');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordEye.classList.remove('fa-eye');
                passwordEye.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordEye.classList.remove('fa-eye-slash');
                passwordEye.classList.add('fa-eye');
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('tbos_theme');
            if (savedTheme === 'cool') {
                document.documentElement.setAttribute('data-theme', 'cool');
                document.getElementById('theme-icon').className = 'fas fa-sun';
                document.getElementById('theme-text').textContent = 'Cool';
            }
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                if (user.role === 'Administrator' || user.role === 'Executive Director') {
                    window.location.href = 'admin.html';
                }
            }
        });

        document.getElementById('admin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const btnSubmit = document.getElementById('btn-submit');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const successMessage = document.getElementById('success-message');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<div class="loading-spinner"></div> Verifying...';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password)
                    .single();
                if (error || !data) {
                    throw new Error('Invalid credentials');
                }
                if (data.role !== 'Administrator' && data.role !== 'Executive Director' && data.role !== 'Branch Manager') {
                    throw new Error('Access denied. Admin privileges required.');
                }
                if (data.status !== 'Active') {
                    throw new Error('Account not active. Contact system administrator.');
                }
                localStorage.setItem('currentUser', JSON.stringify(data));
                localStorage.setItem('currentStaffId', data.id);
                successMessage.style.display = 'flex';
                document.getElementById('success-text').textContent = 'Access granted! Redirecting...';
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } catch (error) {
                console.error('❌ Admin access error:', error);
                errorMessage.style.display = 'flex';
                errorText.textContent = 'Access denied: ' + error.message;
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Dashboard';
                document.getElementById('admin-password').value = '';
            }
        });

        window.toggleTheme = toggleTheme;
        window.togglePassword = togglePassword;
    </script>
</body>
</html>
