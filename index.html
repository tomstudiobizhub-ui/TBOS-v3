<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-input: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --primary: #008080;
            --primary-hover: #006666;
            --success: #00c851;
            --danger: #ff4444;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .login-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary) 0%, #004d4d 100%);
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .logo i { font-size: 2.5rem; color: #ffffff; }
        .login-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #ffffff; }
        .login-header .tagline { color: rgba(255,255,255,0.8); font-size: 0.85rem; letter-spacing: 1px; }

        .login-body { padding: 40px 30px; }

        .error-message, .success-message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message { background: rgba(255, 68, 68, 0.15); border: 1px solid var(--danger); color: var(--danger); }
        .success-message { background: rgba(0, 200, 81, 0.15); border: 1px solid var(--success); color: var(--success); }

        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 10px; font-size: 0.9rem; font-weight: 500; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
        }

        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0, 128, 128, 0.2); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

        .login-footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .login-footer a { color: var(--primary); text-decoration: none; }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-header { padding: 30px 20px; }
            .login-body { padding: 30px 20px; }
            .login-header h1 { font-size: 1.5rem; }
            .logo { width: 60px; height: 60px; }
            .logo i { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo"><i class="fas fa-cube"></i></div>
            <h1>TBOS v3.0</h1>
            <p class="tagline">Track • Record • Route • Report • Improve</p>
        </div>

        <div class="login-body">
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Login failed</span>
            </div>

            <div class="success-message" id="success-message">
                <i class="fas fa-check-circle"></i>
                <span id="success-text">Success!</span>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Staff Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="email" id="login-email" placeholder="staff@tbos.com" required value="admin@tbos.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required value="@admin123#">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Secure Sign In</span>
                </button>
            </form>

            <a href="register.html" class="btn-secondary">
                <i class="fas fa-user-plus"></i> New Staff? Register Here
            </a>

            <div class="login-footer">
                <strong>Demo Credentials:</strong><br>
                Admin: admin@tbos.com | @admin123#<br>
                <br>
                <strong>Support:</strong> <a href="tel:+2348030827417">+234 803 082 7417</a><br>
                Built by Tomstudio Tech Academy<br>
                TBOS v3.0 | Production System
            </div>
        </div>
    </div>

    <script>
        // GOOGLE SHEETS DATABASE - SheetDB APIs
        const API_USERS = 'https://sheetdb.io/api/v1/gjd4fyhfyalnm';

        // Check if already logged in
        if (localStorage.getItem('tbos_user')) {
            console.log('✅ Already logged in, redirecting to dashboard...');
            window.location.href = 'dashboard.html';
        }

        // Login Form
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btnSubmit = document.getElementById('btn-submit');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const successMessage = document.getElementById('success-message');

            console.log('🔐 Attempting login for:', email);

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<div class="loading-spinner"></div> Signing In...';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                // Fetch users from Google Sheets via SheetDB
                console.log('📡 Fetching users from SheetDB...');
                const response = await fetch(API_USERS);
                
                if (!response.ok) {
                    throw new Error('Failed to connect to database. Status: ' + response.status);
                }
                
                const users = await response.json();
                console.log('✅ Users fetched:', users.length);

                // Find matching user
                const user = users.find(u => u.email === email && u.password === password);
                
                if (!user) {
                    throw new Error('Invalid email or password');
                }

                console.log('✅ User found:', user.name, user.role);

                // Save session to localStorage
                localStorage.setItem('tbos_user', JSON.stringify({
                    id: user.id,
                    name: user.name,
                    email: user.email,
                    role: user.role,
                    hub: user.hub,
                    phone: user.phone,
                    status: user.status
                }));

                // Show success message
                successMessage.style.display = 'flex';
                document.getElementById('success-text').textContent = 'Login successful! Redirecting...';

                // Redirect based on role
                setTimeout(() => {
                    console.log('🚀 Redirecting to dashboard...');
                    if(user.role === 'Administrator') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);

            } catch (error) {
                console.error('❌ Login error:', error);
                errorMessage.style.display = 'flex';
                errorText.textContent = 'Login failed: ' + error.message;
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fas fa-sign-in-alt"></i> Secure Sign In';
                document.getElementById('login-password').value = '';
            }
        });
    </script>
</body>
</html>
