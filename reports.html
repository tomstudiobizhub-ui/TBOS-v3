<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-panel: #1a1a1a;
            --bg-sidebar: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --primary: #008080;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }
        
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .brand { padding: 25px; border-bottom: 1px solid var(--border); color: var(--primary); font-size: 1.5rem; font-weight: 700; }

        .nav-item {
            padding: 15px 25px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 128, 128, 0.1);
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
        }

        .stat-value { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; }

        .panel {
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }

        .btn-logout {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-logout:hover { background: var(--danger); color: white; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="brand"><i class="fas fa-cube"></i> TBOS v3.0</div>
        <nav>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs & Routing</a>
            <a href="staff.html" class="nav-item"><i class="fas fa-users"></i> Staff & ID Cards</a>
            <a href="inventory.html" class="nav-item"><i class="fas fa-boxes"></i> Inventory</a>
            <a href="knowledge.html" class="nav-item"><i class="fas fa-book"></i> Knowledge Center</a>
            <a href="reports.html" class="nav-item active"><i class="fas fa-chart-line"></i> Reports</a>
            <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <h2>Reports & Analytics</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">₦0</div>
                <div class="stat-label">Daily Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">₦0</div>
                <div class="stat-label">Weekly Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">₦0</div>
                <div class="stat-label">Monthly Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">₦0</div>
                <div class="stat-label">Outstanding Payments</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="panel">
                <h3><i class="fas fa-chart-line"></i> Revenue Trend</h3>
                <div class="chart-container">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fas fa-chart-pie"></i> Job Category Distribution</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fas fa-chart-bar"></i> Hub Performance</h3>
                <div class="chart-container">
                    <canvas id="hubChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fas fa-chart-area"></i> Jobs Status</h3>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(
                'https://epvgarbconcrwasccjxu.supabase.co',
                'sb_publishable_ZTwyZPfFc8uXFXpG_Wkarw_f5ygNfBg'
            );
        }

        // Auth Check
        window.addEventListener('DOMContentLoaded', async function() {
            try {
                const { data } = await window.supabaseClient.auth.getSession();
                if (!data.session) {
                    window.location.href = 'index.html';
                    return;
                }
                initCharts();
            } catch(error) {
                window.location.href = 'index.html';
            }
        });

        // Initialize Charts
        function initCharts() {
            // Revenue Chart
            new Chart(document.getElementById('revenueChart'), {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Revenue (₦)',
                        data: [15000, 23000, 18000, 32000, 28000, 45000, 38000],
                        borderColor: '#008080',
                        backgroundColor: 'rgba(0, 128, 128, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#333' } },
                        x: { grid: { color: '#333' } }
                    }
                }
            });

            // Category Chart
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Graphics', 'Printing', 'Photography', 'Tech Academy'],
                    datasets: [{
                        data: [35, 25, 20, 20],
                        backgroundColor: ['#008080', '#006666', '#004d4d', '#003333']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
                }
            });

            // Hub Performance Chart
            new Chart(document.getElementById('hubChart'), {
                type: 'bar',
                data: {
                    labels: ['Graphics', 'Printing', 'Photography', 'Tech Academy', 'Online Shop'],
                    datasets: [{
                        label: 'Jobs Completed',
                        data: [45, 38, 25, 52, 30],
                        backgroundColor: '#008080'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#333' } },
                        x: { grid: { color: '#333' } }
                    }
                }
            });

            // Status Chart
            new Chart(document.getElementById('statusChart'), {
                type: 'pie',
                data: {
                    labels: ['Completed', 'In Progress', 'Pending', 'Delayed'],
                    datasets: [{
                        data: [60, 20, 15, 5],
                        backgroundColor: ['#00c851', '#008080', '#ffbb33', '#ff4444']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
                }
            });
        }

        async function logout() {
            await window.supabaseClient.auth.signOut();
            localStorage.removeItem('tbos_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
