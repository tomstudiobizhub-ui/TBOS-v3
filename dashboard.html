<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-panel: #1a1a1a;
            --bg-sidebar: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --primary: #008080;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }
        
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .brand {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .nav-item {
            padding: 15px 25px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 128, 128, 0.1);
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hub-badge {
            padding: 5px 15px;
            background: rgba(0, 128, 128, 0.2);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
        }

        .stat-value { font-size: 2.5rem; font-weight: 700; margin-bottom: 5px; }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; }

        .panel {
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .btn-logout {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; z-index: 100; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block !important; cursor: pointer; margin-right: 15px; }
        }

        .menu-toggle { display: none; }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading">
        <i class="fas fa-spinner fa-spin" style="margin-right: 10px;"></i>
        Loading Dashboard...
    </div>

    <!-- Main Content (Hidden until auth verified) -->
    <div id="main-content" style="display: none; width: 100%;">
        <aside class="sidebar" id="sidebar">
            <div class="brand"><i class="fas fa-cube"></i> TBOS v3.0</div>
            <nav>
                <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs & Routing</a>
                <a href="staff.html" class="nav-item"><i class="fas fa-users"></i> Staff & ID Cards</a>
                <a href="inventory.html" class="nav-item"><i class="fas fa-boxes"></i> Inventory</a>
                <a href="knowledge.html" class="nav-item"><i class="fas fa-book"></i> Knowledge Center</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center;">
                    <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()" style="font-size: 1.5rem; margin-right: 15px;"></i>
                    <h2>Dashboard</h2>
                </div>
                <div class="user-info">
                    <span id="user-name">User</span>
                    <span id="user-hub" class="hub-badge">Hub</span>
                    <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-jobs">0</div>
                    <div class="stat-label">Today's Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">Pending Approval</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-revenue">₦0</div>
                    <div class="stat-label">Monthly Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-delayed">0</div>
                    <div class="stat-label">Delayed Jobs</div>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fas fa-bullhorn"></i> Announcements</h3>
                <p style="color: var(--text-muted); margin-top: 15px;">No new announcements.</p>
            </div>
        </main>
    </div>

    <!-- Supabase Library - Load ONCE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Initialize Supabase ONCE (Check if already exists) -->
    <script>
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(
                'https://epvgarbconcrwasccjxu.supabase.co',
                'sb_publishable_ZTwyZPfFc8uXFXpG_Wkarw_f5ygNfBg'
            );
            console.log('✅ Supabase Initialized');
        }
    </script>

    <!-- Dashboard Logic -->
    <script>
        // Auth Check
        window.addEventListener('DOMContentLoaded', async function() {
            try {
                const { data } = await window.supabaseClient.auth.getSession();
                
                if (!data.session) {
                    window.location.href = 'index.html';
                    return;
                }

                const { data: profile } = await window.supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', data.session.user.id)
                    .single();

                if (!profile) {
                    await window.supabaseClient.auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }

                document.getElementById('user-name').textContent = profile.full_name;
                document.getElementById('user-hub').textContent = profile.hub;

                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

            } catch(error) {
                console.error('Auth error:', error);
                window.location.href = 'index.html';
            }
        });

        // Logout
        async function logout() {
            await window.supabaseClient.auth.signOut();
            localStorage.removeItem('tbos_user');
            localStorage.removeItem('tbos_hub');
            localStorage.removeItem('tbos_role');
            window.location.href = 'index.html';
        }

        // Toggle Sidebar (Mobile)
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
