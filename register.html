<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { 
            background: radial-gradient(circle at center, #1e1e1e 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }
        .register-card {
            background: var(--bg-panel); padding: 40px; border-radius: 12px;
            width: 100%; max-width: 500px; box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .register-card h1 { color: var(--primary); margin-bottom: 10px; text-align: center; }
        .register-card .subtitle { color: var(--text-muted); margin-bottom: 30px; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 0.85rem; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-main);
        }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--primary);
            color: #fff; font-weight: 600; border-radius: var(--radius);
            font-size: 1rem; cursor: pointer; border: none;
        }
        .btn-primary:hover { opacity: 0.9; }
        .back-link { 
            display: block; text-align: center; margin-top: 20px; 
            color: var(--text-muted); text-decoration: none;
        }
        .back-link:hover { color: var(--primary); }
        .error-msg { 
            background: rgba(255, 68, 68, 0.2); border: 1px solid var(--danger);
            color: var(--danger); padding: 12px; border-radius: var(--radius);
            margin-bottom: 20px; display: none;
        }
        .success-msg { 
            background: rgba(0, 200, 81, 0.2); border: 1px solid var(--success);
            color: var(--success); padding: 12px; border-radius: var(--radius);
            margin-bottom: 20px; display: none;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1><i class="fas fa-user-plus"></i> TBOS v3.0</h1>
        <p class="subtitle">Staff Registration</p>
        
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>
        
        <form id="register-form">
            <div class="input-group">
                <label>Full Name *</label>
                <input type="text" id="reg-name" required placeholder="Enter full name">
            </div>
            <div class="input-group">
                <label>Email *</label>
                <input type="email" id="reg-email" required placeholder="staff@tbos.com">
            </div>
            <div class="input-group">
                <label>Phone *</label>
                <input type="tel" id="reg-phone" required placeholder="+234...">
            </div>
            <div class="input-group">
                <label>Hub *</label>
                <select id="reg-hub" required>
                    <option value="">Select Hub...</option>
                    <option value="Graphics Design">Graphics Design</option>
                    <option value="Printing">Printing</option>
                    <option value="Photography">Photography</option>
                    <option value="Tech Academy">Tech Academy</option>
                    <option value="Online Shop">Online Shop</option>
                    <option value="IT">IT</option>
                </select>
            </div>
            <div class="input-group">
                <label>Role *</label>
                <select id="reg-role" required>
                    <option value="Staff">Staff</option>
                    <option value="Manager">Manager</option>
                    <option value="Intern">Intern</option>
                </select>
            </div>
            <div class="input-group">
                <label>Password *</label>
                <input type="password" id="reg-password" required minlength="6" placeholder="Min 6 characters">
            </div>
            <div class="input-group">
                <label>Confirm Password *</label>
                <input type="password" id="reg-confirm" required minlength="6">
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-user-plus"></i> Register (Pending Approval)
            </button>
        </form>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://epvgarbconcrwasccjxu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZTwyZPfFc8uXFXpG_Wkarw_f5ygNfBg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            
            if(password !== confirm) {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').textContent = 'Passwords do not match!';
                return;
            }
            
            const email = document.getElementById('reg-email').value;
            const name = document.getElementById('reg-name').value;
            const hub = document.getElementById('reg-hub').value;
            const role = document.getElementById('reg-role').value;
            const phone = document.getElementById('reg-phone').value;
            
            try {
                // Sign up with Supabase Auth
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name,
                            hub: hub,
                            role: role,
                            phone: phone
                        }
                    }
                });
                
                if(error) throw error;
                
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('success-msg').textContent = 
                    'Registration successful! Please wait for admin approval.';
                
                document.getElementById('register-form').reset();
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
                
            } catch(error) {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').textContent = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
