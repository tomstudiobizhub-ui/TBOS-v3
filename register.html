<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration | TBOS v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="module" src="config.js"></script>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-input: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
            --primary: #008080;
            --primary-hover: #006666;
            --success: #00c851;
            --danger: #ff4444;
            --radius: 16px;
        }
        [data-theme="cool"] {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --bg-input: #f5f7fa;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden;
            width: 100%;
        }
        [data-theme="cool"] body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .register-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            z-index: 10;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.2); }
        .register-header {
            background: linear-gradient(135deg, var(--primary) 0%, #004d4d 100%);
            padding: 30px;
            text-align: center;
        }
        .register-header h1 { font-size: 1.8rem; margin-bottom: 8px; color: #ffffff; }
        .register-header p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        .register-body { padding: 30px; }
        .error-message, .success-message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .error-message { background: rgba(255, 68, 68, 0.15); border: 1px solid var(--danger); color: var(--danger); }
        .success-message { background: rgba(0, 200, 81, 0.15); border: 1px solid var(--success); color: var(--success); }
        .photo-upload { margin-bottom: 20px; text-align: center; }
        .photo-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .photo-preview:hover { border-color: var(--primary); transform: scale(1.05); }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-preview i { font-size: 2.5rem; color: var(--text-muted); }
        .photo-preview.has-image img { display: block; }
        .photo-preview.has-image i { display: none; }
        .photo-label { color: var(--text-muted); font-size: 0.85rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .form-full { grid-column: 1 / -1; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 128, 128, 0.2);
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
            padding: 5px;
        }
        .password-toggle:hover { color: var(--primary); }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .register-header { padding: 20px; }
            .register-body { padding: 20px; }
            .register-header h1 { font-size: 1.5rem; }
            body { padding: 15px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="theme-icon"></i>
            <span id="theme-text">Dark</span>
        </button>
        <div class="register-header">
            <h1><i class="fas fa-user-plus"></i> TBOS v3.0</h1>
            <p>Staff Registration</p>
        </div>
        <div class="register-body">
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Registration failed</span>
            </div>
            <div class="success-message" id="success-message">
                <i class="fas fa-check-circle"></i>
                <span id="success-text">Success!</span>
            </div>
            <form id="register-form" class="form-grid">
                <div class="photo-upload form-full">
                    <div class="photo-preview" id="photo-preview" onclick="document.getElementById('reg-photo').click()">
                        <i class="fas fa-camera"></i>
                        <img id="photo-img" src="" alt="Profile Photo">
                    </div>
                    <p class="photo-label">Click to upload passport photo (Max 2MB)</p>
                    <input type="file" id="reg-photo" accept="image/*" style="display: none;" onchange="previewPhoto(this)">
                </div>
                <div class="form-group form-full">
                    <label>Full Name *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" required placeholder="Enter full name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" required placeholder="staff@tbos.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="reg-phone" required placeholder="+234...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Hub *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building"></i>
                        <select id="reg-hub" required>
                            <option value="">Select Hub...</option>
                            <option value="Online Shop">Online Shop</option>
                            <option value="Graphics Design">Graphics Design</option>
                            <option value="Printing">Printing</option>
                            <option value="Photography">Photography</option>
                            <option value="CBT Center">CBT Center</option>
                            <option value="Tech Lab">Tech Lab</option>
                            <option value="Tech Academy">Tech Academy</option>
                            <option value="Gadgets">Gadgets</option>
                            <option value="Other Services">Other Services</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Role *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-badge"></i>
                        <select id="reg-role" required>
                            <option value="Staff">Staff</option>
                            <option value="Administrator">Administrator</option>
                            <option value="Executive Director">Executive Director</option>
                            <option value="Branch Manager">Branch Manager</option>
                            <option value="Secretary">Secretary</option>
                            <option value="Apprentice">Apprentice</option>
                            <option value="Intern">Intern</option>
                            <option value="IT">IT</option>
                            <option value="HOD">HOD</option>
                        </select>
                    </div>
                </div>
                <div class="form-group form-full">
                    <label>Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="reg-address" placeholder="Full address">
                    </div>
                </div>
                <div class="form-group form-full">
                    <label>Location</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map"></i>
                        <input type="text" id="reg-location" placeholder="City, State">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" required minlength="6" placeholder="Min 6 characters">
                        <button type="button" class="password-toggle" onclick="togglePassword('reg-password', 'password-eye-1')">
                            <i class="fas fa-eye" id="password-eye-1"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-confirm" required minlength="6" placeholder="Confirm password">
                        <button type="button" class="password-toggle" onclick="togglePassword('reg-confirm', 'password-eye-2')">
                            <i class="fas fa-eye" id="password-eye-2"></i>
                        </button>
                    </div>
                </div>
                <div class="form-actions form-full">
                    <button type="submit" class="btn-primary" id="btn-submit">
                        <i class="fas fa-user-plus"></i>
                        <span>Register (Pending Approval)</span>
                    </button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const SUPABASE_URL = 'https://wbmshbmfrteutglydiay.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibXNoYm1mcnRldXRnbHlkaWF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjk5OTIsImV4cCI6MjA5MjkwNTk5Mn0.UiV0Uaxv0fXb_sHuoIOJ2AGJKenUmfmFAzaifPY0A6Y';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'dark' : 'cool';
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (newTheme === 'cool') {
                document.documentElement.setAttribute('data-theme', 'cool');
                icon.className = 'fas fa-sun';
                text.textContent = 'Cool';
                localStorage.setItem('tbos_theme', 'cool');
            } else {
                document.documentElement.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                text.textContent = 'Dark';
                localStorage.setItem('tbos_theme', 'dark');
            }
        }

        function togglePassword(inputId, eyeId) {
            const passwordInput = document.getElementById(inputId);
            const passwordEye = document.getElementById(eyeId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordEye.classList.remove('fa-eye');
                passwordEye.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordEye.classList.remove('fa-eye-slash');
                passwordEye.classList.add('fa-eye');
            }
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 2097152) {
                    alert('File size must be less than 2MB');
                    input.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photo-img').src = e.target.result;
                    document.getElementById('photo-preview').classList.add('has-image');
                }
                reader.readAsDataURL(file);
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('tbos_theme');
            if (savedTheme === 'cool') {
                document.documentElement.setAttribute('data-theme', 'cool');
                document.getElementById('theme-icon').className = 'fas fa-sun';
                document.getElementById('theme-text').textContent = 'Cool';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const btnSubmit = document.getElementById('btn-submit');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const successMessage = document.getElementById('success-message');
            if (password !== confirm) {
                errorMessage.style.display = 'flex';
                errorText.textContent = 'Passwords do not match!';
                return;
            }
            if (password.length < 6) {
                errorMessage.style.display = 'flex';
                errorText.textContent = 'Password must be at least 6 characters';
                return;
            }
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<div class="loading-spinner"></div> Registering...';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            try {
                const formData = {
                    email: document.getElementById('reg-email').value,
                    password: password,
                    name: document.getElementById('reg-name').value,
                    role: document.getElementById('reg-role').value,
                    hub: document.getElementById('reg-hub').value,
                    phone: document.getElementById('reg-phone').value,
                    address: document.getElementById('reg-address').value,
                    location: document.getElementById('reg-location').value,
                    status: 'Pending Approval',
                    score: 0,
                    jobs_logged: 0,
                    jobs_completed: 0,
                    revenue_generated: 0,
                    created_at: new Date().toISOString()
                };
                const { data: result, error } = await supabase
                    .from('users')
                    .insert([formData])
                    .select();
                if (error) throw error;
                successMessage.style.display = 'flex';
                document.getElementById('success-text').textContent = 'Registration successful! Your account is pending admin approval.';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            } catch (error) {
                console.error('❌ Registration error:', error);
                errorMessage.style.display = 'flex';
                let errorMsg = 'Registration failed: ' + error.message;
                if (error.message?.includes('duplicate')) {
                    errorMsg = 'Email already exists. Please use a different email.';
                }
                errorText.textContent = errorMsg;
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fas fa-user-plus"></i> Register (Pending Approval)';
            }
        });
        window.toggleTheme = toggleTheme;
        window.togglePassword = togglePassword;
        window.previewPhoto = previewPhoto;
    </script>
</body>
</html>
